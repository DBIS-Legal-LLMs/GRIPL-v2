spring.config.import=optional:file:.env[.properties],optional:classpath:.env[.properties]

spring.application.name=gripl-backend
server.port=8080

llm.api-key=${OPENAI_API_KEY}

management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/gripl
spring.datasource.username=postgres
spring.datasource.password=admin

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.frontend.base-url=http://localhost:3000
# Comma-separated allowed browser origins (dev)
app.cors.allowed-origins=http://localhost:3000,http://localhost:8000,http://gripl-frontend:3000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha